<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Check-In</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Check-In" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#5BBD8A" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #5BBD8A;
      overflow: hidden;
    }

    /* FORM */
    #formScreen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 28px;
      padding-top: max(36px, env(safe-area-inset-top));
      padding-bottom: max(36px, env(safe-area-inset-bottom));
      overflow-y: auto;
    }

    #formScreen h1 { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 6px; }
    #formScreen > p { font-size: 14px; color: #888; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    .field > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="time"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e4e4e4;
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      color: #111;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus { border-color: #5BBD8A; }
    input::placeholder { color: #bbb; }

    #btnOkay {
      margin-top: 10px;
      width: 100%;
      padding: 16px;
      background: #5BBD8A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .photo-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 100px;
      border: 2px dashed #d0d0d0;
      border-radius: 14px;
      cursor: pointer;
      color: #aaa;
      font-size: 13px;
      position: relative;
      overflow: hidden;
      background: #fafafa;
    }
    .photo-upload-label .upload-icon { font-size: 26px; }
    .photo-upload-label img.preview {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 12px;
    }
    #inputPhoto { display: none; }

    /* CARD */
    #cardScreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100dvh;
      background: #5BBD8A;
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }
    #cardScreen.visible { display: flex; }

    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: max(18px, env(safe-area-inset-top));
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 4px;
      position: relative;
      flex-shrink: 0;
    }
    .close-x {
      position: absolute;
      left: 20px;
      color: rgba(255,255,255,.9);
      font-size: 22px;
      cursor: pointer;
    }
    .nav-bar h2 { color: #fff; font-size: 17px; font-weight: 600; }

    .avatar-area {
      flex: 1;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 20px 24px 28px;
    }

    .avatar-ring {
      position: relative;
      width: 190px;
      height: 190px;
    }
    .avatar-ring svg.ring-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      animation: spin 20s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-circle {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      overflow: hidden;
    }

    .check-badge {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 36px; height: 36px;
      background: #5BBD8A;
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check-badge svg { width: 18px; height: 18px; }

    .checkin-meta { text-align: center; color: #fff; }
    .checkin-meta .time-ago { font-size: 13px; opacity: .9; margin-bottom: 6px; }
    .checkin-meta .name { font-size: 22px; font-weight: 700; }
    .checkin-meta .member { font-size: 12px; opacity: .65; margin-top: 5px; }

    .bottom-card {
      background: #f2f2f2;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px max(24px, env(safe-area-inset-bottom));
      flex-shrink: 0;
      width: 100%;
    }

    .activity-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .activity-thumb {
      width: 58px; height: 58px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .activity-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .activity-info { flex: 1; min-width: 0; }
    .act-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 2px; }
    .act-date { font-size: 13px; color: #444; margin-bottom: 5px; }

    .act-meta-line {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
    }
    .act-meta-line svg { width: 12px; height: 12px; flex-shrink: 0; }
    .act-meta-line .location-short { margin-left: 6px; white-space: nowrap; }

    .share-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #fff;
      border: 1.5px solid #5BBD8A;
      border-radius: 14px;
      color: #5BBD8A;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      -webkit-text-fill-color: #5BBD8A;
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- FORM -->
<div id="formScreen">
  <h1>Check-In 📍</h1>
  <p>Wo gehst du heute hin?</p>

  <div class="field">
    <label>Dein Name</label>
    <input type="text" id="inputName" placeholder="Habicht hat zwei H's" />
  </div>
  <div class="field">
    <label>Ort / Gym</label>
    <input type="text" id="inputOrt" placeholder="Atlantis" />
  </div>
  <div class="field">
    <label>Uhrzeit</label>
    <input type="time" id="inputUhrzeit" />
  </div>
  <div class="field">
    <label>Dein Foto</label>
    <label class="photo-upload-label" id="photoLabel" for="inputPhoto">
      <span class="upload-icon">📷</span>
      <span id="photoHint">Foto auswählen</span>
    </label>
    <input type="file" id="inputPhoto" accept="image/*" />
  </div>

  <button id="btnOkay">Okay ✓</button>
</div>

<!-- CARD -->
<div id="cardScreen">
  <div class="nav-bar">
    <span class="close-x" id="closeBtn">✕</span>
    <h2>Du bist eingecheckt</h2>
  </div>

  <div class="avatar-area">
    <div class="avatar-ring">
      <svg class="ring-svg" viewBox="0 0 190 190" fill="none">
        <circle cx="95" cy="95" r="88"
          stroke="rgba(255,255,255,0.5)"
          stroke-width="1.5"
          stroke-dasharray="5 6"
          stroke-linecap="round"/>
      </svg>
      <div class="avatar-circle" id="avatarCircle">🧗</div>
      <div class="check-badge">
        <svg viewBox="0 0 17 17" fill="none">
          <path d="M3.5 8.5l3.8 3.8L13.5 5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="checkin-meta">
      <div class="time-ago" id="cardTimeAgo">Eingecheckt: 00:00 minutes ago</div>
      <div class="name" id="cardName">–</div>
      <div class="member">M PRO Mitgliedschaftsnummer: 199205056</div>
    </div>
  </div>

  <div class="bottom-card">
    <div class="activity-row">
      <div class="activity-thumb">
        <img src="https://images.unsplash.com/photo-1564769662533-4f00a87b4056?w=120&h=120&fit=crop&crop=center" alt="Bouldern" />
      </div>
      <div class="activity-info">
        <div class="act-title">Bouldern</div>
        <div class="act-date" id="actDate">–</div>
        <div class="act-meta-line">
          <svg viewBox="0 0 12 12" fill="none">
            <path d="M6 1a3 3 0 110 6A3 3 0 016 1zm0 7c-2.2 0-4 .7-4 1.5S3.8 11 6 11s4-.7 4-1.5S8.2 8 6 8z" fill="#555"/>
          </svg>
          <span id="actLocation">–</span>
          <span class="location-short" id="actShort"></span>
        </div>
        <div class="act-meta-line">
          <svg viewBox="0 0 12 12" fill="none">
            <path d="M2 2h4l4.5 4.5a1 1 0 010 1.4L8 10.4a1 1 0 01-1.4 0L2 5.5V2z" stroke="#555" stroke-width="1" stroke-linejoin="round"/>
            <circle cx="4" cy="4" r=".8" fill="#555"/>
          </svg>
          <span>Bouldern</span>
        </div>
      </div>
    </div>
    <button class="share-btn" id="shareBtn">Teile deinen check-in</button>
  </div>
</div>

<script>
  var uploadedPhotoDataUrl = null;

  // prefill time
  var now = new Date();
  document.getElementById('inputUhrzeit').value =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  // photo preview
  document.getElementById('inputPhoto').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      uploadedPhotoDataUrl = e.target.result;
      var label = document.getElementById('photoLabel');
      var old = label.querySelector('img.preview');
      if (old) old.remove();
      var img = document.createElement('img');
      img.src = uploadedPhotoDataUrl;
      img.className = 'preview';
      label.insertBefore(img, label.firstChild);
      document.getElementById('photoHint').style.display = 'none';
      label.querySelector('.upload-icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // okay button
  document.getElementById('btnOkay').addEventListener('click', function() {
    var name = document.getElementById('inputName').value.trim();
    var ort  = document.getElementById('inputOrt').value.trim();
    var zeit = document.getElementById('inputUhrzeit').value;

    if (!name || !ort || !zeit) {
      alert('Bitte alle Felder ausfüllen.');
      return;
    }

    // set avatar
    var circle = document.getElementById('avatarCircle');
    circle.innerHTML = '';
    if (uploadedPhotoDataUrl) {
      var img = document.createElement('img');
      img.src = uploadedPhotoDataUrl;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      img.style.borderRadius = '50%';
      circle.appendChild(img);
    } else {
      circle.textContent = '🧗';
    }

    // date string
    var d = new Date();
    var months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
    var dateStr = d.getDate() + ' ' + months[d.getMonth()] + ', ' + zeit;

    // short location
    var parts = ort.split(' ');
    var short = parts.length >= 2 ? '(' + parts[parts.length - 1] + ')' : '';

    document.getElementById('cardName').textContent = name;
    document.getElementById('actDate').textContent = dateStr;
    document.getElementById('actLocation').textContent = ort;
    document.getElementById('actShort').textContent = short;
    document.getElementById('cardTimeAgo').textContent = 'Eingecheckt: 00:00 minutes ago';

    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('cardScreen').classList.add('visible');

    // counter
    var secs = 0;
    var card = document.getElementById('cardScreen');
    if (card._interval) clearInterval(card._interval);
    card._interval = setInterval(function() {
      secs++;
      var mm = String(Math.floor(secs / 60)).padStart(2,'0');
      var ss = String(secs % 60).padStart(2,'0');
      document.getElementById('cardTimeAgo').textContent = 'Eingecheckt: ' + mm + ':' + ss + ' minutes ago';
    }, 1000);
  });

  // close button
  document.getElementById('closeBtn').addEventListener('click', function() {
    var card = document.getElementById('cardScreen');
    if (card._interval) clearInterval(card._interval);
    card.classList.remove('visible');
    document.getElementById('formScreen').style.display = 'flex';
    document.getElementById('inputName').value = '';
    document.getElementById('inputOrt').value = '';
    uploadedPhotoDataUrl = null;
    document.getElementById('inputPhoto').value = '';
    var label = document.getElementById('photoLabel');
    var old = label.querySelector('img.preview');
    if (old) old.remove();
    document.getElementById('photoHint').style.display = '';
    label.querySelector('.upload-icon').style.display = '';
    var n = new Date();
    document.getElementById('inputUhrzeit').value =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  });

  // share button
  document.getElementById('shareBtn').addEventListener('click', function() {
    var name = document.getElementById('cardName').textContent;
    var ort  = document.getElementById('actLocation').textContent;
    var date = document.getElementById('actDate').textContent;
    var text = '✅ ' + name + ' ist eingecheckt!\n📍 ' + ort + '\n🕐 ' + date;
    if (navigator.share) {
      navigator.share({ title: 'Check-In', text: text });
    } else {
      navigator.clipboard.writeText(text).then(function() { alert('Kopiert!'); });
    }
  });
</script>
</body>
</html>
